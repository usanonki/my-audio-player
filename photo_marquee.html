<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>경칩 인사말 갤러리</title>
    <!-- 구글 폰트 감자꽃 불러오기 -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; background: #000; height: 100vh; overflow: hidden; }
        .container { position: relative; width: 100%; max-width: 800px; height: 500px; overflow: hidden; }
        
        /* 사진 스타일: 3초 페이드 인/아웃 */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        /* 자막 스타일: 연두색, 감자꽃 폰트, 플레이어 바로 위 */
        .caption-container {
            position: absolute;
            bottom: 45px; /* 플레이어(25px) 바로 위 위치 */
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            z-index: 20;
            background: transparent;
            pointer-events: none; /* 클릭 방해 금지 */
        }

        .scrolling-text {
            display: inline-block;
            font-family: 'Gamja Flower', cursive; 
            font-size: 28px;
            color: #adff2f; /* 상큼한 연두색 */
            /* 가독성을 위한 검정 테두리 효과 */
            text-shadow: 2px 2px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            padding-left: 100%;
            animation: marquee 40s linear infinite; /* 40초 동안 천천히 이동 */
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 오디오 플레이어 스타일 (3% 94% 슬림형) */
        audio {
            position: absolute;
            bottom: 25px; 
            left: 3%;
            width: 94%;
            height: 10px;
            opacity: 0; 
            transition: opacity 0.5s ease;
            z-index: 10;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
        }
        .container:hover audio { opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <!-- 자막 영역 -->
    <div class="caption-container">
        <div class="scrolling-text">
            🐸 겨울 잠을 자던 개구리가 깨어 나고 새싹이 돋아나는 경칩입니다. 🌸 경칩이 지나면 봄은 한걸음 더 가까이 오겠죠? 🌼 기온 차가 있는 환절기에 건강 조심 하시고 오늘 하루도 행복하게 보내시기 바랍니다. ✨
        </div>
    </div>

    <!-- 사진 리스트 -->
    <img src="https://t1.daumcdn.net/cafeattach/ihX6/bab31d85e3fdf27b96c7efd23ed6cb857a964e5c_re_1772650976755" class="slide active">
    <img src="https://t1.daumcdn.net/cafeattach/ihX6/d820a5164520ee893ad81cefd4e297ef192ef8d5_re_1772650976754" class="slide">
    <img src="https://t1.daumcdn.net/cafeattach/rjvj/7c28ef25314a5b9896b0b1da841d181a4f84070a" class="slide">
    <img src="https://t1.daumcdn.net/cafeattach/rjvj/6d5912db613a6117f2225e3cd7c117eba9ca7ad1" class="slide">

    <!-- 오디오 플레이어 -->
    <audio id="myAudio" src="https://blog.kakaocdn.net/dn/bOwEhD/btsJViDbb39/oBBKaGG1ymGzXSwpQ8QC4K/tfile.mp3" controls autoplay loop></audio>
</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    // 30초마다 사진 변경
    setInterval(nextSlide, 30000);

    // 클릭 시 음악 재생 보장
    window.addEventListener('click', function() {
        var audio = document.getElementById('myAudio');
        if (audio.paused) { audio.play(); }
    }, { once: true });
</script>

</body>
</html>
