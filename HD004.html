<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HD004-E</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .caption-container {
            position: absolute;
            top: 20px;
            width: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .typewriter-line {
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            opacity: 0;
            border-right: 2px solid transparent;
        }

        /* 엔딩 전용 스타일 */
        .ending {
            font-size: 36px;
            color: #ffb7d5;
            text-shadow:
                0 0 8px #ff9ac2,
                0 0 12px #ff9ac2,
                0 0 18px #ff9ac2;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%   { text-shadow: 0 0 5px #ff9ac2; }
            50%  { text-shadow: 0 0 18px #ff9ac2; }
            100% { text-shadow: 0 0 5px #ff9ac2; }
        }

        .ending.fixed {
            opacity: 1 !important;
            animation: glow 3s ease-in-out infinite !important;
            width: auto !important;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* 유튜브 */
        .youtube-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 240px;
            height: 135px;
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            opacity: 0.55;
            filter: brightness(0.85);
        }

        /* 볼륨 UI */
        .inner-volume-box {
            position: fixed;
            bottom: 15px;
            left: 270px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.45);
            padding: 6px 10px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            z-index: 9999;
        }

        .vol-label {
            color: white;
            font-size: 12px;
        }

        #volumeSlider {
            flex: 1;
            margin: 0 10px;
            cursor: pointer;
            height: 3px;
            background: #ccc;
            border-radius: 5px;
        }

        #volumeSlider::-webkit-slider-thumb {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        .eq-gif {
            width: 70px;
            height:20px;
            margin-left: 10px;
            opacity: 0.9;
            filter: drop-shadow(0 0 3px #000);
        }

        .eq-hidden {
            opacity: 0;
            transition: opacity 0.4s ease;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="caption-container" id="captionBox">

        <!-- 반복되는 시(詩) -->
        <div class="typewriter-line" id="line1">차 한 잔이 그리운 날</div>
        <div class="typewriter-line" id="line2">청복(淸福)한 송이</div>
        <div class="typewriter-line" id="line3">나를 유혹하는 차의 향긋함 속</div>
        <div class="typewriter-line" id="line4">내 마음을 흔들어가는 이 시간</div>
        <div class="typewriter-line" id="line5">차 한 잔을 함께 나눌 수 있는 그대가 좋아요</div>
        <div class="typewriter-line" id="line6">여유로움 속 이 시간</div>
        <div class="typewriter-line" id="line7">꽃 같은 향기에 젖어보는 날입니다 🌸</div>

        <!-- 반복되는 명언 -->
        <div class="typewriter-line" id="line8">꿈은 영원한 기쁨이자</div>
        <div class="typewriter-line" id="line9">다 써버릴 수 없는 재산이고</div>
        <div class="typewriter-line" id="line10">해가 갈수록 활력을 주는</div>
        <div class="typewriter-line" id="line11">행운이다.</div>

        <!-- 엔딩 메시지 -->
        <div class="typewriter-line ending" id="line12">Happy ❤️ Day 회원님,</div>
        <div class="typewriter-line ending" id="line13">언제나</div>
        <div class="typewriter-line ending" id="line14">건강하고 행복한 날</div>
        <div class="typewriter-line ending" id="line15">되세요.~~~~~~~~~~</div>
    </div>

    <!-- 이미지 -->
    <img src="https://usanonki.github.io/photo/011.gif" class="slide active">
    <img src="https://usanonki.github.io/photo/041.gif" class="slide">
    <img src="https://usanonki.github.io/photo/013.gif" class="slide">
    <img src="https://usanonki.github.io/photo/058.gif" class="slide">
    <img src="https://usanonki.github.io/photo/015.gif" class="slide">
    <img src="https://usanonki.github.io/photo/061.gif" class="slide">
    <img src="https://usanonki.github.io/photo/017.gif" class="slide">
    <img src="https://usanonki.github.io/photo/063.gif" class="slide">
</div>

<!-- 유튜브 -->
<iframe id="ytPlayer" class="youtube-bar"
    src="https://www.youtube.com/embed/dwPXejUmbNg?enablejsapi=1&autoplay=1&controls=1&loop=1&playlist=dwPXejUmbNg"
    allow="autoplay"
></iframe>

<!-- 볼륨 UI -->
<div class="inner-volume-box">
    <span class="vol-label">Vol</span>
    <input type="range" id="volumeSlider" min="0" max="100" step="1" value="35">
    <span id="volumeValue" class="vol-label">35%</span>
    <img src="equalizer.gif" class="eq-gif" id="eqGif">
</div>

<script>
/* 이미지 슬라이드 */
let currentIndex = 0;
const slides = document.querySelectorAll('.slide');
function nextSlide() {
    slides[currentIndex].classList.remove('active');
    currentIndex = (currentIndex + 1) % slides.length;
    slides[currentIndex].classList.add('active');
}
setInterval(nextSlide, 6000);

/* 반복 타이핑 라인 */
const lines = [
    "line1","line2","line3","line4","line5","line6","line7",
    "line8","line9","line10","line11"
];

function startTyping() {
    lines.forEach(id => {
        const el = document.getElementById(id);
        el.style.opacity = "0";
        el.style.width = "0";
        el.style.animation = "none";
        void el.offsetWidth;
    });

    let delay = 1000;

    lines.forEach((id, index) => {
        const el = document.getElementById(id);

        if (index >= 7) delay += 2000;
        if (index >= 11) delay += 2000;

        setTimeout(() => {
            el.style.opacity = "1";
            el.style.animation =
                "typing 3s steps(30, end) forwards, fadeIn 1s ease forwards";
        }, delay);

        delay += 4000;
    });

    const waitTime = delay + 6000;

    setTimeout(() => {
        let fadeDelay = 0;

        lines.forEach(id => {
            const el = document.getElementById(id);
            setTimeout(() => {
                el.style.animation = "fadeOut 5s ease forwards";
            }, fadeDelay);
            fadeDelay += 500;
        });

        setTimeout(startTyping, fadeDelay + 5500);
    }, waitTime);
}

startTyping();

/* YouTube API */
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytPlayer', {
        events: {
            'onReady': onPlayerReady,
            'onStateChange': onPlayerStateChange
        }
    });
}

function onPlayerStateChange(event) {
    const eq = document.getElementById("eqGif");
    if (event.data === YT.PlayerState.PLAYING) eq.classList.remove("eq-hidden");
    else eq.classList.add("eq-hidden");
}

function onPlayerReady() {
    const slider = document.getElementById("volumeSlider");
    const valueText = document.getElementById("volumeValue");

    slider.addEventListener("input", () => {
        const vol = slider.value;
        player.setVolume(vol);
        valueText.textContent = vol + "%";
    });
}

/* 엔딩 메시지 */
function showEnding() {
    const endLines = ["line12","line13","line14","line15"];
    let delay = 0;

    endLines.forEach(id => {
        const el = document.getElementById(id);

        setTimeout(() => {
            el.style.opacity = "1";
            el.style.animation =
                "typing 3s steps(30, end) forwards, fadeIn 1s ease forwards, glow 3s ease-in-out infinite";
        }, delay);

        delay += 4000;
    });

    setTimeout(() => {
        endLines.forEach(id => {
            const el = document.getElementById(id);
            el.classList.add("fixed");
        });
    }, delay + 1000);
}

/* 7분 30초에 엔딩 실행 */
let endingShown = false;

setInterval(() => {
    if (!player) return;

    const t = player.getCurrentTime();

    if (t >= 450 && !endingShown) {
        endingShown = true;
        showEnding();
    }
}, 1000);

</script>

<script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
