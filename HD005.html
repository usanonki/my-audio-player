<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HD004-E</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .caption-container {
            position: absolute;
            top: 20px;
            width: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .typewriter-line {
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            opacity: 0;
            border-right: 2px solid transparent;
        }

        .ending {
            font-size: 36px;
            color: #ffb7d5;
            text-shadow:
                0 0 8px #ff9ac2,
                0 0 12px #ff9ac2,
                0 0 18px #ff9ac2;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%   { text-shadow: 0 0 5px #ff9ac2; }
            50%  { text-shadow: 0 0 18px #ff9ac2; }
            100% { text-shadow: 0 0 5px #ff9ac2; }
        }

        .ending.fixed {
            opacity: 1 !important;
            animation: glow 3s ease-in-out infinite !important;
            width: auto !important;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* 유튜브 */
        .youtube-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 240px;
            height: 135px;
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            opacity: 0.55;
            filter: brightness(0.85);
        }

        /* 볼륨 UI */
        .inner-volume-box {
            position: fixed;
            bottom: 15px;
            left: 270px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.45);
            padding: 6px 10px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            z-index: 9999;
        }

        .vol-label {
            color: white;
            font-size: 12px;
        }

        #volumeSlider {
            flex: 1;
            margin: 0 10px;
            cursor: pointer;
            height: 3px;
            background: #ccc;
            border-radius: 5px;
        }

        #volumeSlider::-webkit-slider-thumb {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        .eq-gif {
            width: 70px;
            height:20px;
            margin-left: 10px;
            opacity: 0.9;
            filter: drop-shadow(0 0 3px #000);
        }

        .eq-hidden {
            opacity: 0;
            transition: opacity 0.4s ease;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="caption-container" id="captionBox">

        <!-- 반복되는 시(詩) -->
        <div class="typewriter-line" id="line1">차 한 잔이 그리운 날</div>
        <div class="typewriter-line" id="line2">청복(淸福)한 송이</div>
        <div class="typewriter-line" id="line3">나를 유혹하는 차의 향긋함 속
