<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Premium Audio Player - usanonki</title>
    <style>
        /* 1. 전체 배경화면 설정 (Test.jpg) */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('Test.jpg') no-repeat center center;
            background-size: contain;
            background-color: #f5f5dc;
            display: flex;
            align-items: center; 
            overflow: hidden;
        }

        /* 2. 플레이어 위치 제어 (왼쪽 55% 지점 배치) */
        .layout-wrapper {
            width: 100%;
    /* 왼쪽 끝에서 약간의 여백(예: 5%)만 주고 배치합니다 */
            padding-left: 8%; 
            padding-top: 50px; /* 상단이 잘리는 만큼 이 숫자를 키워서 전체를 내리세요 */
            box-sizing: border-box;
            display: flex;
    
        }

        /* 3. 오디오 플레이어 본체 (배경: Happy.jpg) */
        .player-container { 
            width: 450px;
            padding: 250px 25px 100px 25px; 
            border-radius: 25px;
            font-family: 'Malgun Gothic', sans-serif;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);

            /* --- 크기 조절 핵심 코드 --- */
        transform: scale(0.85);      /* 0.8은 80% 크기로 줄인다는 뜻입니다 */
        transform-origin: left top; /* 왼쪽 상단을 기준으로 줄여서 위치 이탈 방지 */
            
            /* 플레이어 배경에 Happy.jpg 설정 */
            background: linear-gradient(rgba(245, 245, 220, 0.6), rgba(245, 245, 220, 0.6)), url('Happy.jpg');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(5px);
            position: relative;
        }

        #current-title { display: block; font-size: 1.1em; font-weight: bold; margin-bottom: 20px; color: #3e2723; text-align: center; height: 1.2em; overflow: hidden; }
        audio { width: 100%; height: 30px; opacity: 0.85; margin-bottom: 15px; }

        .volume-control { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 8px 12px; 
            border-radius: 12px; 
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }

        /* 4. 재생 목록 스타일 */
        .playlist { 
            list-style: none; padding: 0; margin: 0; 
            max-height: 300px; overflow-y: auto;
            background: rgba(255, 255, 255, 0.3); border-radius: 15px;
        }
        .playlist li { 
            padding: 15px; cursor: pointer; color: #4a342e; font-weight: 500; font-size: 0.9em;
            display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .playlist li:hover { background: rgba(255, 255, 255, 0.4); }
        .playlist li.active { background: #ff4757; color: white; border-radius: 10px; font-weight: bold; }
        
        #volSlider { flex: 1; height: 4px; cursor: pointer; }
        button { border: none; background: none; cursor: pointer; font-weight: bold; color: #3e2723; }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="player-container">
            <small style="color: #6d4c41; display:block; text-align:center; margin-bottom:5px; font-weight: bold;">Music Library</small>
            <span id="current-title">노래를 재생하세요</span>
            
            <audio id="myAudio" controls autoplay muted>
                <source id="audioSource" src="" type="audio/mpeg">
            </audio>

            <div class="volume-control">
                <button id="muteBtn">소리 켜기</button>
                <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.1">
                <span id="volText" style="font-size:0.85em; color:#3e2723;">10%</span>
            </div>

            <ul class="playlist" id="playlistDisplay"></ul>
        </div>
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const source = document.getElementById('audioSource');
    const titleDisplay = document.getElementById('current-title');
    const playlistDisplay = document.getElementById('playlistDisplay');

    // 5. GitHub에 업로드된 정확한 곡명 리스트
    const songs = [
        "YouAreCryingToo.mp3", 
        "Memory Remains.mp3", 
        "spring.mp3", 
        "그대는어디에.mp3"
    ];
    let currentIdx = 0;

    function renderPlaylist() {
        playlistDisplay.innerHTML = "";
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            const isActive = (index === currentIdx);
            // 재생 중인 곡은 흰색 아이콘, 나머지는 빨간색 아이콘
            const iconColor = isActive ? "white" : "#ff4757";
            
            li.innerHTML = `<span style="color: ${iconColor}; margin-right: 12px;">▶</span> ${song.replace('.mp3', '')}`;
            if(isActive) li.className = "active";
            li.onclick = () => playSong(index);
            playlistDisplay.appendChild(li);
        });
    }

    function playSong(index) {
        currentIdx = index;
        source.src = encodeURIComponent(songs[currentIdx]); // 한글 파일명 등 특수문자 처리
        titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
        audio.load();
        audio.play().catch(e => console.log("자동 재생 정책으로 인해 클릭이 필요합니다."));
        renderPlaylist();
    }

    // 초기 설정
    audio.volume = 0.1;
    renderPlaylist();
    playSong(0); // 첫 곡 세팅

    // 볼륨 조절
    document.getElementById('volSlider').oninput = (e) => {
        audio.volume = e.target.value;
        document.getElementById('volText').innerText = Math.round(e.target.value * 100) + "%";
    };

  // 음소거 버튼 클릭 이벤트 부분
const muteBtn = document.getElementById('muteBtn');
muteBtn.onclick = () => {
    // 1. 음소거 상태 토글
    audio.muted = !audio.muted;
    
    if (!audio.muted) {
        // 2. 음소거를 해제하는 순간, 강제로 재생 명령을 내림 (크롬 대응)
        audio.play().then(() => {
            muteBtn.innerText = "음소거";
        }).catch(error => {
            console.log("재생 실패:", error);
        });
    } else {
        muteBtn.innerText = "소리 켜기";
    }
};


    // 곡이 끝나면 자동으로 다음 곡 재생
    audio.onended = () => {
        let nextIdx = (currentIdx + 1) % songs.length;
        playSong(nextIdx);
    };
</script>

</body>
</html>
