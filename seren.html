<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>봄마중 인사말 갤러리</title>

    <!-- 구글 폰트 감자꽃 -->
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
        }

        /* 사진 페이드 효과 */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            border-radius: 10px;
            -webkit-mask-image: radial-gradient(circle, black 95%, transparent 100%);
            mask-image: radial-gradient(circle, black 95%, transparent 100%);
        }
        .slide.active { opacity: 1; }

        /* 비누방울 GIF 오버레이 */
        .bubble-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
            z-index: 12;
            opacity: 0.8;
        }

        .second-bubble {
            animation-delay: 6s;
            opacity: 0.7;
        }

        .bubble-overlay {
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 0.8; }
        }

        /* 자막 */
        .caption-container {
            position: absolute;
            bottom: 45px;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            z-index: 20;
            background: transparent;
            pointer-events: none;
        }

        .scrolling-text {
            display: inline-block;
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000,
                         -1px 1px 0 #000, 1px 1px 0 #000;
            padding-left: 100%;
            animation: marquee 40s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 오디오 플레이어 */
        audio {
            position: fixed;
            bottom: 20px;
            left: 3%;
            width: 94%;
            height: 14px;
            opacity: 0.9;
            z-index: 9999;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 비누방울 GIF 오버레이 -->
    <img src="https://usanonki.github.io/photo/bubble02.gif" class="bubble-overlay">
    <img src="https://usanonki.github.io/photo/bubble04.gif" class="bubble-overlay second-bubble">

    <!-- 자막 -->
    <div class="caption-container">
        <div class="scrolling-text">
        봄마중 꽃마중 가는 불금♪♬✿˘◡˘✿✿⊱⊹~✿⊱⊹~✿⊱⊹~✿⊱⊹~
        신나게 출~~~~발 합니다ε=ε= ᕕ( ᐛ )ᕗ
        ㉵㉶!㉵㉶!㉵㉶!화이팅ᕙ(•̀‸•́‶)ᕗ
        회원님네 가정에 항상 좋은 일만 가득하세요ㅡ☜ ((♡+:..:+"*☆♡)) ☞ㅡ 🐸  🌸  🌼  ✨
        </div>
    </div>

    <!-- GitHub 이미지 100~107 -->
    <img src="https://usanonki.github.io/photo/100.jpg" class="slide active">
    <img src="https://usanonki.github.io/photo/101.jpg" class="slide">
    <img src="https://usanonki.github.io/photo/102.jpg" class="slide">
    <img src="https://usanonki.github.io/photo/103.jpg" class="slide">
    <img src="https://usanonki.github.io/photo/104.jpg" class="slide">
    <img src="https://usanonki.github.io/photo/105.jpg" class="slide">
    <img src="https://usanonki.github.io/photo/106.jpg" class="slide">
    <img src="https://usanonki.github.io/photo/107.jpg" class="slide">

    <!-- 오디오 -->
    <audio id="myAudio" src="spring.mp3" controls autoplay loop></audio>
</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    // 20초마다 사진 변경
    setInterval(nextSlide, 20000);

    // 클릭 시 음악 재생 보장
    window.addEventListener('click', function() {
        var audio = document.getElementById('myAudio');
        if (audio.paused) { audio.play(); }
    }, { once: true });
</script>

</body>
</html>
