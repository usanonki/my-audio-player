<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Premium Audio Player - usanonki</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('Test.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center; 
            overflow: hidden;
        }

        .layout-wrapper {
            width: 100%;
            padding-left: 55%; 
            box-sizing: border-box;
        }

        .player-container { 
            width: 350px;
            padding: 50px 25px; /* 내부 여백 최적화 */
            border-radius: 25px;
            font-family: 'Malgun Gothic', sans-serif;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            
            /* 배경 이미지 선명하게 설정 */
            background: linear-gradient(rgba(245, 245, 220, 0.2), rgba(245, 245, 220, 0.2)), url('Happy.jpg');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(0px); 
            position: relative;
        }

        #current-title { display: block; font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #3e2723; text-align: center; height: 1.2em; overflow: hidden; }
        audio { width: 100%; height: 30px; opacity: 0.85; margin-bottom: 10px; }

        /* 플레이어 내부 볼륨 조절바 스타일 */
        .inner-volume-box {
            background: rgba(255, 255, 255, 0.5); /* 반투명 배경 */
            padding: 5px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px; /* 곡 리스트와의 간격 */
        }
        #volumeSlider { flex: 1; margin: 0 10px; cursor: pointer; height: 2px; }
        .vol-label { font-weight: bold; color: #3e2723; font-size: 0.8em; }

        .playlist { 
            list-style: none; padding: 0; margin: 0; 
            max-height: 200px; overflow-y: auto;
            background: rgba(255, 255, 255, 0.3); border-radius: 15px;
        }
        .playlist li { 
            padding: 12px 15px; cursor: pointer; color: #4a342e; font-weight: 500; font-size: 0.9em;
            display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .playlist li:hover { background: rgba(255, 255, 255, 0.4); }
        .playlist li.active { background: #ff4757; color: white; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="player-container">
            <small style="color: #6d4c41; display:block; text-align:center; margin-bottom:5px; font-weight: bold;">Music Library</small>
            <span id="current-title">노래를 재생하세요</span>
            
            <!-- 1. 오디오 바 -->
            <audio id="myAudio" controls>
                <source id="audioSource" src="" type="audio/mpeg">
            </audio>

            <!-- 2. 오디오 바 바로 밑에 볼륨 조절바 배치 -->
            <div class="inner-volume-box">
                <span class="vol-label">Vol</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1">
                <span id="volumeValue" class="vol-label">10%</span>
            </div>

            <!-- 3. 곡 리스트 -->
            <ul class="playlist" id="playlistDisplay"></ul>
        </div>
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const source = document.getElementById('audioSource');
    const titleDisplay = document.getElementById('current-title');
    const playlistDisplay = document.getElementById('playlistDisplay');
    const volSlider = document.getElementById('volumeSlider');
    const volValueText = document.getElementById('volumeValue');

    const songs = [
        "YouAreCryingToo.mp3", 
        "Memory Remains.mp3", 
        "spring.mp3", 
        "그대는어디에.mp3"
    ];
    let currentIdx = 0;

    function renderPlaylist() {
        playlistDisplay.innerHTML = "";
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            const isActive = (index === currentIdx);
            const iconColor = isActive ? "white" : "#ff4757";
            
            li.innerHTML = `<span style="color: ${iconColor}; margin-right: 12px;">▶</span> ${song.replace('.mp3', '')}`;
            if(isActive) li.className = "active";
            li.onclick = () => playSong(index);
            playlistDisplay.appendChild(li);
        });
    }

    function playSong(index) {
        currentIdx = index;
        source.src = encodeURIComponent(songs[currentIdx]);
        titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
        audio.load();
        audio.play().catch(e => console.log("재생을 위해 클릭이 필요합니다."));
        renderPlaylist();
    }

    // 볼륨 조절 기능
    volSlider.oninput = (e) => {
        const val = e.target.value;
        audio.volume = val;
        volValueText.innerText = Math.round(val * 100) + "%";
    };

    // 초기 설정
    audio.volume = 0.1;
    renderPlaylist();

    currentIdx = 0;
    source.src = encodeURIComponent(songs[currentIdx]);
    titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
    audio.load(); 

    audio.onended = () => {
        let nextIdx = (currentIdx + 1) % songs.length;
        playSong(nextIdx);
    };
</script>

</body>
</html>
