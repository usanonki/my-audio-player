<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Premium Audio Player - usanonki</title>
    <style>
        /* 1. 전체 배경화면 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('Test.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center; 
            overflow: hidden;
        }

        /* 2. 플레이어 위치 제어 */
        .layout-wrapper {
            width: 100%;
            padding-left: 55%; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column; /* 세로로 배치 (플레이어 + 볼륨바) */
            gap: 15px; /* 플레이어와 볼륨바 사이 간격 */
        }

        /* 3. 오디오 플레이어 본체 */
        .player-container { 
            width: 350px;
            padding: 80px 25px; 
            border-radius: 25px;
            font-family: 'Malgun Gothic', sans-serif;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            
            /* [수정] 이미지를 더 선명하게: 투명도를 0.6에서 0.2로 낮춤, 블러를 0px로 설정 */
            background: linear-gradient(rgba(245, 245, 220, 0.2), rgba(245, 245, 220, 0.2)), url('Happy.jpg');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(0px); 
            
            position: relative;
        }

        #current-title { display: block; font-size: 1.1em; font-weight: bold; margin-bottom: 20px; color: #3e2723; text-align: center; height: 1.2em; overflow: hidden; }
        audio { width: 100%; height: 30px; opacity: 0.85; margin-bottom: 15px; }

        /* 4. 재생 목록 스타일 */
        .playlist { 
            list-style: none; padding: 0; margin: 0; 
            max-height: 250px; overflow-y: auto;
            background: rgba(255, 255, 255, 0.3); border-radius: 15px;
        }
        .playlist li { 
            padding: 15px; cursor: pointer; color: #4a342e; font-weight: 500; font-size: 0.9em;
            display: flex; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        .playlist li:hover { background: rgba(255, 255, 255, 0.4); }
        .playlist li.active { background: #ff4757; color: white; border-radius: 10px; font-weight: bold; }

        /* 5. 외부 볼륨 조절바 스타일 */
        .external-volume-control {
            width: 350px;
            background: rgba(255, 255, 255, 0.7); /* 반투명 흰색 배경 */
            padding: 15px 25px;
            border-radius: 15px;
            box-sizing: border-box;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #volumeSlider { flex: 1; margin: 0 15px; cursor: pointer; }
        .vol-label { font-weight: bold; color: #3e2723; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <!-- 오디오 플레이어 본체 -->
        <div class="player-container">
            <small style="color: #6d4c41; display:block; text-align:center; margin-bottom:5px; font-weight: bold;">Music Library</small>
            <span id="current-title">노래를 재생하세요</span>
            
            <audio id="myAudio" controls>
                <source id="audioSource" src="" type="audio/mpeg">
            </audio>

            <ul class="playlist" id="playlistDisplay"></ul>
        </div>

        <!-- 플레이어 외부 하단 볼륨 조절바 -->
        <div class="external-volume-control">
            <span class="vol-label">볼륨 조절</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1">
            <span id="volumeValue" class="vol-label">10%</span>
        </div>
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const source = document.getElementById('audioSource');
    const titleDisplay = document.getElementById('current-title');
    const playlistDisplay = document.getElementById('playlistDisplay');
    const volSlider = document.getElementById('volumeSlider');
    const volValueText = document.getElementById('volumeValue');

    const songs = [
        "YouAreCryingToo.mp3", 
        "Memory Remains.mp3", 
        "spring.mp3", 
        "그대는어디에.mp3"
    ];
    let currentIdx = 0;

    function renderPlaylist() {
        playlistDisplay.innerHTML = "";
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            const isActive = (index === currentIdx);
            const iconColor = isActive ? "white" : "#ff4757";
            
            li.innerHTML = `<span style="color: ${iconColor}; margin-right: 12px;">▶</span> ${song.replace('.mp3', '')}`;
            if(isActive) li.className = "active";
            li.onclick = () => playSong(index);
            playlistDisplay.appendChild(li);
        });
    }

    function playSong(index) {
        currentIdx = index;
        source.src = encodeURIComponent(songs[currentIdx]);
        titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
        audio.load();
        audio.play().catch(e => console.log("재생을 위해 클릭이 필요합니다."));
        renderPlaylist();
    }

    // 볼륨 조절 기능 연결
    volSlider.oninput = (e) => {
        const val = e.target.value;
        audio.volume = val;
        volValueText.innerText = Math.round(val * 100) + "%";
    };

    // 초기 설정
    audio.volume = 0.1; // 초기 볼륨 10%
    renderPlaylist();

    // 첫 곡 정보 로드
    source.src = encodeURIComponent(songs[0]);
    titleDisplay.innerText = songs[0].replace('.mp3', '');
    audio.load(); 

    // 곡 자동 재생
    audio.onended = () => {
        let nextIdx = (currentIdx + 1) % songs.length;
        playSong(nextIdx);
    };
</script>

</body>
</html>
