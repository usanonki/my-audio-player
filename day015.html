<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Bird & Flower Demo</title>

<style>
body {
    margin: 0;
    height: 100vh;

    /* GIF + 배경 JPG */
    background-image: 
        url("birdflower.gif"), 
        url("001.jpg");

    /* GIF 위치(꽃 위) + 배경 위치 */
    background-position: 
        right 872px bottom 286px, 
        center center;

    /* GIF 크기 + 배경 크기 */
    background-size: 
        350px, 
        cover;

    background-repeat: 
        no-repeat, 
        no-repeat;

    background-attachment: fixed;
}

/* 오디오 플레이어 스타일 */
audio {
    width: 100%;
    height: 40px;
    position: fixed;
    bottom: 0;
    left: 0;
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<audio controls autoplay loop>
    <source src="spring.mp3" type="audio/mpeg">
</audio>

</body>
</html>
