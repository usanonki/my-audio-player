<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>시골길에 핀 민들레</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .caption-container {
            position: absolute;
            top: 40px;
            width: 100%;
            height: 500px;
            z-index: 20;
            pointer-events: none;
        }

        .typewriter-line {
            font-family: 'Gamja Flower', cursive;
            font-size: 26px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000;
            white-space: nowrap;
            overflow: hidden;
            width: auto;
            opacity: 0;
            border-right: 2px solid transparent;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .ending {
            font-family: 'Gamja Flower', cursive;
            font-size: 36px;
            color: #ff007f;
            text-shadow:
                0 0 8px #ff9ac2,
                0 0 12px #ff9ac2,
                0 0 18px #ff9ac2;
            align-self: flex-start !important;
            left: 0 !important;
            transform: none !important;
            opacity: 0;
            white-space: nowrap;
            border-right: 2px solid transparent;
        }

        #endingWrapper {
            position: absolute;
            top: 10%;
            left: 0;
            width: 80%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: all 2s ease-in-out;
        }

        #endingWrapper.center {
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            align-items: center;
            text-align: center;
        }

        @keyframes glow {
            0%   { text-shadow: 0 0 5px #ff9ac2; }
            50%  { text-shadow: 0 0 18px #ff9ac2; }
            100% { text-shadow: 0 0 5px #ff9ac2; }
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* 볼륨 UI */
        .inner-volume-box {
            position: fixed;
            bottom: 15px;
            left: 270px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.45);
            padding: 6px 10px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            z-index: 9999;
        }

        .vol-label { color: white; font-size: 12px; }
        #volumeSlider { flex: 1; margin: 0 10px; cursor: pointer; height: 3px; }
        .eq-gif { width: 70px; height:20px; margin-left: 10px; transition: opacity 0.4s; }

        /* 감성 아트 오디오 플레이어 */
        .mini-player {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 240px;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 8px;
            background: rgba(0,0,0,0.45);
            border-radius: 10px;
            backdrop-filter: blur(6px);
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
            z-index: 9999;
        }

        .album-art {
            width: 55px;
            height: 55px;
            border-radius: 6px;
            object-fit: cover;
            margin-right: 10px;
        }

        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 13px;
            color: #fff;
            margin-bottom: 4px;
        }

        #playBtn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            margin-right: 8px;
            font-size: 14px;
        }

        #seekBar {
            width: 100%;
            margin-top: 4px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- 감성 아트 오디오 플레이어 -->
<div class="mini-player">
    <img src="https://usanonki.github.io/photo/064.gif" class="album-art">
    
    <div class="player-info">
        <div class="title">시골길에 핀 민들레</div>
        <div class="controls">
            <button id="playBtn">▶</button>
        </div>
        <input type="range" id="seekBar" value="0" min="0" max="100">
    </div>
</div>

<div class="container">
    <div class="caption-container" id="captionBox">
