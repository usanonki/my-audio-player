<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HD006 (최종 수정본)</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .caption-container {
            position: absolute;
            top: 40px;
            width: 100%;
            height: 500px;
            z-index: 20;
            pointer-events: none;
        }

        .typewriter-line {
            font-family: 'Gamja Flower', cursive;
            font-size: 26px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000;
            white-space: nowrap;
            overflow: hidden;
            width: auto;
            opacity: 0;
            border-right: 2px solid transparent;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 엔딩 라인 */
        .ending {
            font-family: 'Gamja Flower', cursive;
            font-size: 36px;
            color: #ff007f;
            text-shadow:
                0 0 8px #ff9ac2,
                0 0 12px #ff9ac2,
                0 0 18px #ff9ac2;
            transform: none !important;   /* ⭐ 중앙 겹침 문제 해결 */
            opacity: 0;
            white-space: nowrap;
            border-right: 2px solid transparent;
        }

        /* 엔딩 Wrapper */
        #endingWrapper {
            position: absolute;
            top: 55%;     /* ⭐ group1과 겹치지 않도록 조정 */
            left: 10%;
            width: 80%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: all 2s ease-in-out;
        }

        #endingWrapper.center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            align-items: center;
            text-align: center;
        }

        @keyframes glow {
            0%   { text-shadow: 0 0 5px #ff9ac2; }
            50%  { text-shadow: 0 0 18px #ff9ac2; }
            100% { text-shadow: 0 0 5px #ff9ac2; }
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* 유튜브 및 볼륨 UI */
        .youtube-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 240px;
            height: 135px;
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            opacity: 0.55;
            filter: brightness(0.85);
        }

        .inner-volume-box {
            position: fixed;
            bottom: 15px;
            left: 270px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.45);
            padding: 6px 10px;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            z-index: 9999;
        }

        .vol-label { color: white; font-size: 12px; }
        #volumeSlider { flex: 1; margin: 0 10px; cursor: pointer; height: 3px; }
        .eq-gif { width: 70px; height:20px; margin-left: 10px; transition: opacity 0.4s; }
    </style>
</head>

<body>

<div class="container">
    <div class="caption-container" id="captionBox">

        <!-- 반복 시 -->
        <div class="typewriter-line" id="line1">차 한 잔이 그리운 날</div>
        <div class="typewriter-line" id="line2">청복(淸福)한 송이</div>
        <div class="typewriter-line" id="line3">나를 유혹하는 차의 향긋함 속</div>
        <div class="typewriter-line" id="line4">내 마음을 흔들어가는 이 시간</div>
        <div class="typewriter-line" id="line5">차 한 잔을 함께 나눌 수 있는 그대가 좋아요</div>
        <div class="typewriter-line" id="line6">여유로움 속 이 시간</div>
        <div class="typewriter-line" id="line7">꽃 같은 향기에 젖어보는 날입니다 🌸</div>

        <!-- 반복 명언 -->
        <div class="typewriter-line" id="line8">꿈은 영원한 기쁨이자</div>
        <div class="typewriter-line" id="line9">다 써버릴 수 없는 재산이고</div>
        <div class="typewriter-line" id="line10">
