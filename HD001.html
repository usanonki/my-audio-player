<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>차 한 잔이 그리운 날</title>

    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
        }

        /* 사진 페이드 효과 */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            border-radius: 10px;
        }
        .slide.active { opacity: 1; }

        /* 자막 */
        .caption-container {
            position: absolute;
            top: 30px; /* 상단 여백 하단 여백은-->bottom: 45px;*/
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            z-index: 20;
            background: transparent;
            pointer-events: none;
        }

        

    
        /* YouTube 얇은 플레이어 */
        .youtube-bar {
            position: fixed;
            bottom: 10px; /* 하단 여백 */
            left: 10px;   /* 좌측 여백 */
            width: 240px; /* 시청하기 적당한 크기 */
            height: 135px; /* 16:9 비율 */
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);position: fixed;
            
        }

        .typewriter-line {
        position: absolute;
        top: 30px;
        width: 100%;
        text-align: center;
        font-family: 'Gamja Flower', cursive;
        font-size: 28px;
        color: #adff2f;
        text-shadow: 2px 2px 2px #000;
        opacity: 0;
        white-space: nowrap;
        overflow: hidden;
      }

    @keyframes typing {
    from { width: 0; }
    to { width: 100%; }
    }

    @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
    }


    </style>
</head>
<body>

<div class="container">

    <!-- 자막 -->
   <div class="caption-container">
    <div class="typewriter-line" id="line1">차 한 잔이 그리운 날</div>
    <div class="typewriter-line" id="line2">청복(淸福)한 송이</div>
    <div class="typewriter-line" id="line3">나를 유혹하는 차의 향긋함 속</div>
    <div class="typewriter-line" id="line4">내 마음을 흔들어가는 이 시간</div>
    <div class="typewriter-line" id="line5">차 한 잔을 함께 나눌 수 있는 그대가 좋아요</div>
    <div class="typewriter-line" id="line6">여유로움 속 이 시간</div>
    <div class="typewriter-line" id="line7">꽃 같은 향기에 젖어보는 날입니다 🌸</div>
</div>


    <!-- GitHub 이미지 슬라이드 -->
    <img src="https://usanonki.github.io/photo/001.gif" class="slide active">
    <img src="https://usanonki.github.io/photo/002.gif" class="slide">
    <img src="https://usanonki.github.io/photo/003.gif" class="slide">
    <img src="https://usanonki.github.io/photo/012.gif" class="slide">
    <img src="https://usanonki.github.io/photo/013.gif" class="slide">
    <img src="https://usanonki.github.io/photo/014.gif" class="slide">
    <img src="https://usanonki.github.io/photo/015.gif" class="slide">
    <img src="https://usanonki.github.io/photo/016.gif" class="slide">

</div>

<!-- YouTube 얇은 플레이어 -->
<iframe class="youtube-bar"
    src="https://www.youtube.com/embed/pmO9KUfnzVE?autoplay=1&controls=1&loop=1&playlist=pmO9KUfnzVE,xttgWc1KEp0"
    allow="autoplay"
></iframe>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    setInterval(nextSlide, 20000);
</script>

<script>
const lines = [
    "line1", "line2", "line3", "line4", "line5", "line6", "line7"
];

let delay = 0;

lines.forEach((id) => {
    const el = document.getElementById(id);

    setTimeout(() => {
        el.style.opacity = 1;
        el.style.animation = "typing 4s steps(40, end), fadeIn 2s ease";
    }, delay);

    delay += 5000; // 다음 줄은 5초 뒤
});
</script>


</body>
</html>
