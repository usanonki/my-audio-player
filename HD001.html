<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>봄마중 인사말 갤러리</title>

    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
        }

        /* 사진 페이드 효과 */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            border-radius: 10px;
        }
        .slide.active { opacity: 1; }

        /* 자막 */
        .caption-container {
            position: absolute;
            top: 30px; /* 상단 여백 하단 여백은-->bottom: 45px;*/
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            z-index: 20;
            background: transparent;
            pointer-events: none;
        }

        .scrolling-text {
            display: inline-block;
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000,
                         -1px 1px 0 #000, 1px 1px 0 #000;
            padding-left: 100%;
            animation: marquee 40s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* YouTube 얇은 플레이어 */
        .youtube-bar {
            position: fixed;
            bottom: 20px; /* 하단 여백 */
            left: 20px;   /* 좌측 여백 */
            width: 240px; /* 시청하기 적당한 크기 */
            height: 135px; /* 16:9 비율 */
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);position: fixed;
            
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 자막 -->
    <div class="caption-container">
        <div class="scrolling-text">
            차 한 잔이 그리운 날
청복(淸福 )한 송이  
차 한 잔이 그리운 날
나를 유혹하는 차의 향긋함 속
내 마음을 흔들어가는 이 시간
차 한 잔을 함께 나눌 수 있는
그대가 내 옆에 있어서 좋아요

여유로움 속 이 시간
주홍빛 물든 지난날 내 그리움
작은 행복이라지만 내 마음속에
간직했던 아름다운 시절이기에
다시 한번 그 시간을 그려보면서
꽃 같은 향기에 젖어보는 날입니다. 🐸 🌸 🌼 ✨
        </div>
    </div>

    <!-- GitHub 이미지 슬라이드 -->
    <img src="https://usanonki.github.io/photo/001.gif" class="slide active">
    <img src="https://usanonki.github.io/photo/002.gif" class="slide">
    <img src="https://usanonki.github.io/photo/003.gif" class="slide">
    <img src="https://usanonki.github.io/photo/012.gif" class="slide">
    <img src="https://usanonki.github.io/photo/013.gif" class="slide">
    <img src="https://usanonki.github.io/photo/014.gif" class="slide">
    <img src="https://usanonki.github.io/photo/015.gif" class="slide">
    <img src="https://usanonki.github.io/photo/016.gif" class="slide">

</div>

<!-- YouTube 얇은 플레이어 -->
<iframe class="youtube-bar"
    src="https://www.youtube.com/embed/pmO9KUfnzVE?autoplay=1&controls=1&loop=1&playlist=pmO9KUfnzVE,xttgWc1KEp0"
    allow="autoplay"
></iframe>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    setInterval(nextSlide, 20000);
</script>

</body>
</html>
