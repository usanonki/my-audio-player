<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>차 한 잔이 그리운 날</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
        }

        /* 사진 슬라이드 */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        /* 자막 컨테이너 */
        .caption-container {
            position: absolute;
            top: 20px;
            width: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 타이핑 자막 개별 설정 */
        .typewriter-line {
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0; /* 처음엔 너비 0 */
            opacity: 0; /* 처음엔 투명 */
            border-right: 2px solid transparent; /* 커서 효과 원하면 유지 */
        }

        /* 애니메이션 정의 */
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 서서히 사라지는 효과 추가 */
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
}

        /* 유튜브 플레이어 (좌측 하단) */
        .youtube-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 240px;
            height: 135px;
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 자막 영역 -->
    <div class="caption-container" id="captionBox">
        <div class="typewriter-line" id="line1">차 한 잔이 그리운 날</div>
        <div class="typewriter-line" id="line2">청복(淸福)한 송이</div>
        <div class="typewriter-line" id="line3">나를 유혹하는 차의 향긋함 속</div>
        <div class="typewriter-line" id="line4">내 마음을 흔들어가는 이 시간</div>
        <div class="typewriter-line" id="line5">차 한 잔을 함께 나눌 수 있는 그대가 좋아요</div>
        <div class="typewriter-line" id="line6">여유로움 속 이 시간</div>
        <div class="typewriter-line" id="line7">꽃 같은 향기에 젖어보는 날입니다 🌸</div>
    </div>

    <!-- 이미지 슬라이드 -->
    <img src="https://usanonki.github.io/photo/011.gif" class="slide active">
    <img src="https://usanonki.github.io/photo/041.gif" class="slide">
    <img src="https://usanonki.github.io/photo/013.gif" class="slide">
    <img src="https://usanonki.github.io/photo/058.gif" class="slide">
    <img src="https://usanonki.github.io/photo/015.gif" class="slide">
    <img src="https://usanonki.github.io/photo/064.gif" class="slide">
    <img src="https://usanonki.github.io/photo/017.gif" class="slide">
    <img src="https://usanonki.github.io/photo/063.gif" class="slide">
</div>

<iframe class="youtube-bar"
    src="https://www.youtube.com/embed/sqsFyuB5oCs?autoplay=1&controls=1&loop=1&playlist=sqsFyuB5oCs,7d9rRNbOijc"
    allow="autoplay"
></iframe>


<script>
    // 1. 이미지 슬라이드 기능
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }
    setInterval(nextSlide, 8000);

    // 2. 타이핑 및 서서히 사라지는 기능
    const lines = ["line1", "line2", "line3", "line4", "line5", "line6", "line7"];

    function startTyping() {
        // 1. 초기화: 모든 줄을 투명하게
        lines.forEach(id => {
            const el = document.getElementById(id);
            el.style.opacity = "0";
            el.style.width = "0";
            el.style.animation = "none";
            void el.offsetWidth; // 리플로우 강제 발생
        });

        let delay = 1000;

        // 2. 순차적 타이핑 등장
        lines.forEach((id, index) => {
            const el = document.getElementById(id);
            setTimeout(() => {
                el.style.opacity = "1";
                el.style.animation = "typing 3s steps(30, end) forwards, fadeIn 1s ease forwards";
            }, delay);
            delay += 4000;
        });

       / 3. 여운 조절 구간
        // 모든 문장 완성 후 대기 시간을 6초로 단축 (재시작 타이밍 당김)
        const waitTime = delay + 6000; 

        setTimeout(() => {
            // 모든 줄을 더 천천히(4초 동안) 사라지게 함
            lines.forEach(id => {
                const el = document.getElementById(id);
                el.style.animation = "fadeOut 4s ease forwards";
            });

            // 완전히 사라진 후(4초) 약간의 간격(0.5초)을 두고 재시작
            setTimeout(startTyping, 4500);
        }, waitTime);
    }

    // 첫 실행
    startTyping();
</script>

</body>
</html>
