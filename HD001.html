<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>차 한 잔이 그리운 날</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
            border-radius: 10px;
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
        }
        .slide.active { opacity: 1; }

        .caption-container {
            position: absolute;
            top: 20px;
            width: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .typewriter-line {
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            opacity: 0;
            border-right: 2px solid transparent;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* 느린 페이드 아웃 효과 */
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .youtube-bar {
            position: fixed;
            bottom: 15px;
            left: 15px;
            width: 240px;
            height: 135px;
            z-index: 9999;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="caption-container" id="captionBox">
        <div class="typewriter-line" id="line1">차 한 잔이 그리운 날</div>
        <div class="typewriter-line" id="line2">청복(淸福)한 송이</div>
        <div class="typewriter-line" id="line3">나를 유혹하는 차의 향긋함 속</div>
        <div class="typewriter-line" id="line4">내 마음을 흔들어가는 이 시간</div>
        <div class="typewriter-line" id="line5">차 한 잔을 함께 나눌 수 있는 그대가 좋아요</div>
        <div class="typewriter-line" id="line6">여유로움 속 이 시간</div>
        <div class="typewriter-line" id="line7">꽃 같은 향기에 젖어보는 날입니다 🌸</div>
    </div>

    <!-- 이미지 리스트 (6번째 이미지 경로 재확인 및 변경) -->
    <img src="https://usanonki.github.io/photo/011.gif" class="slide active">
    <img src="https://usanonki.github.io/photo/041.gif" class="slide">
    <img src="https://usanonki.github.io/photo/013.gif" class="slide">
    <img src="https://usanonki.github.io/photo/058.gif" class="slide">
    <img src="https://usanonki.github.io/photo/015.gif" class="slide">
    <img src="https://usanonki.github.io/photo/061.gif" class="slide"> 
    <img src="https://usanonki.github.io/photo/017.gif" class="slide">
    <img src="https://usanonki.github.io/photo/063.gif" class="slide">
</div>

<iframe class="youtube-bar"
    src="https://www.youtube.com/embed/sqsFyuB5oCs?autoplay=1&controls=1&loop=1&playlist=sqsFyuB5oCs,7d9rRNbOijc"
    allow="autoplay"
></iframe>

<script>
    // 1. 이미지 슬라이드
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');
    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }
    setInterval(nextSlide, 8000);

    // 2. 타이핑 및 느린 여운 기능
    const lines = ["line1", "line2", "line3", "line4", "line5", "line6", "line7"];

    function startTyping() {
        lines.forEach(id => {
            const el = document.getElementById(id);
            el.style.opacity = "0";
            el.style.width = "0";
            el.style.animation = "none";
            void el.offsetWidth; 
        });

        let delay = 1000;

        // 타이핑 순차 실행
    lines.forEach((id) => {
        const el = document.getElementById(id);
        setTimeout(() => {
            el.style.opacity = "1";
            el.style.animation =
                "typing 3s steps(30, end) forwards, fadeIn 1s ease forwards";
        }, delay);
        delay += 4000;
    });

    // 모든 타이핑이 끝난 후 페이드아웃 시작
    const waitTime = delay + 6000;

    setTimeout(() => {
        let fadeDelay = 0;

        lines.forEach(id => {
            const el = document.getElementById(id);

            setTimeout(() => {
                el.style.animation = "fadeOut 6s ease forwards";
            }, fadeDelay);

            fadeDelay += 500; // 줄마다 0.5초씩 딜레이
        });

        // 전체 페이드아웃이 끝난 후 재시작
        setTimeout(startTyping, fadeDelay + 6500);

    }, waitTime);
}

startTyping();
</script>
</body>
</html>
