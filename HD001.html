<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>봄마중 인사말 갤러리</title>

    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            overflow: hidden;
        }

        /* 사진 페이드 효과 */
        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            border-radius: 10px;
        }
        .slide.active { opacity: 1; }

        /* 자막 */
        .caption-container {
            position: absolute;
            bottom: 45px;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            z-index: 20;
            background: transparent;
            pointer-events: none;
        }

        .scrolling-text {
            display: inline-block;
            font-family: 'Gamja Flower', cursive;
            font-size: 28px;
            color: #adff2f;
            text-shadow: 2px 2px 2px #000, -1px -1px 0 #000, 1px -1px 0 #000,
                         -1px 1px 0 #000, 1px 1px 0 #000;
            padding-left: 100%;
            animation: marquee 40s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* YouTube 얇은 플레이어 */
        <style>
    ... 기존 CSS ...

    /* 여기에 제가 드린 .youtube-small 스타일을 넣으면 됩니다 */
        .youtube-small {
        position: fixed;
        bottom: 20px;     /* 화면 아래에서 20px */
        right: 20px;      /* 화면 오른쪽에서 20px */
        width: 200px;     /* 작은 크기 */
        height: 112px;    /* 16:9 비율 유지 */
        border-radius: 8px;
        overflow: hidden;
        z-index: 9999;
        opacity: 0.85;
        transition: transform 0.3s ease, opacity 0.3s ease;
    }
    /* hover 시 확대 */
        .youtube-small:hover {
        transform: scale(1.2);
        opacity: 1;
    }

    </style>
</head>
<body>

<div class="container">

    <!-- 자막 -->
    <div class="caption-container">

            봄마중 꽃마중 가는 불금♪♬✿˘◡˘✿✿⊱⊹~✿⊱⊹~✿⊱⊹~✿⊱⊹~

        </div>
    </div>

    <!-- GitHub 이미지 슬라이드 -->
    <img src="https://usanonki.github.io/photo/001.gif" class="slide active">
    <img src="https://usanonki.github.io/photo/002.gif" class="slide">
    <img src="https://usanonki.github.io/photo/003.gif" class="slide">
    <img src="https://usanonki.github.io/photo/012.gif" class="slide">

<!-- YouTube 얇은 플레이어 -->
<iframe class="youtube-small"
    src="https://www.youtube.com/embed/pmO9KUfnzVE?autoplay=1&controls=1&loop=1&playlist=pmO9KUfnzVE,xttgWc1KEp0"
    allow="autoplay"
></iframe>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide');

    function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    setInterval(nextSlide, 20000);
</script>
