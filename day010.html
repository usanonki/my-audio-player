<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재생중: Memory Remains.mp3</title>
    <style>
        /* 1. 배경 애니메이션 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: transparent;/* 회색 대신 흰색으로 강제 설정 */
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('001.jpg') no-repeat center center;
            background-size: 800px auto; 
            animation: zoomEffect 20s infinite alternate; /* 20초 동안 천천히 확대/축소 */
            z-index: -1;
            background-color: transparent;
        }

        @keyframes zoomEffect {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* 2. 레이아웃 설정 */
        .content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            background: rgba(0, 0, 0, 0.2); /* 이미지 위에 살짝 어두운 막을 씌워 글자를 선명하게 함 */
        }

        /* 3. 흐르는 자막 (Marquee) 효과 */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 20px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: scrollText 15s linear infinite;
        }

        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        audio {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 30px;
        }
    </style>
</head>
<body>
    <div class="bg-container"></div> <!-- 움직이는 배경 -->
    
    <div class="content">
        <div class="marquee-container">
            <!-- 아래 문구를 원하는 가사나 메시지로 수정해 보세요 -->
            <div class="marquee-text">♬  Memory Remains - 정월 대보름 행복한 하루 되세요! ♬</div>
        </div>
        
        <audio controls src="Memory Remains.mp3"></audio>
    </div>
</body>

</html>
