<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Premium Audio Player - usanonki</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background: url('Test.jpg') no-repeat center center;
            background-size: cover;
            font-family: 'Gamja Flower', sans-serif;
            display: flex;
            flex-direction: column;   /* 세로형 구조 */
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 플레이어 */
        .player-container { 
            width: 330px;
            padding: 30px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.35);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        #current-title { 
            display: block; 
            font-size: 1.3em; 
            font-weight: bold; 
            margin-bottom: 12px; 
            color: #3e2723; 
            height: 1.2em; 
            overflow: hidden; 
        }

        audio {
            width: 100%;
            height: 25px;
            margin-bottom: 10px;
            transform: scale(0.9);
        }

        .inner-volume-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        #volumeSlider {
            flex: 1;
            margin: 0 10px;
            height: 3px;
            background: #ccc;
            border-radius: 5px;
            -webkit-appearance: none;
            appearance: none;
        }

        #volumeSlider::-webkit-slider-thumb {
            width: 10px;
            height: 10px;
            background: #ff4757;
            border-radius: 50%;
            -webkit-appearance: none;
        }

        .playlist {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 150px;
            overflow-y: auto;
            background: rgba(255,255,255,0.3);
            border-radius: 12px;
        }

        .playlist li {
            padding: 10px 12px;
            font-size: 1.1em;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .playlist li.active {
            background: #ff4757;
            color: white;
        }

        /* 문장 */
        .text-box {
            margin-top: 10px;
            font-size: 1.4em;
            color: white;
            line-height: 1.5em;
            white-space: pre-line;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            padding: 0 10px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <small style="color:#6d4c41; font-weight:bold;">Music Library</small>
        <span id="current-title">노래를 재생하세요</span>

        <audio id="myAudio" controls>
            <source id="audioSource" src="" type="audio/mpeg">
        </audio>

        <div class="inner-volume-box">
            <span class="vol-label">Vol</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1">
            <span id="volumeValue" class="vol-label">10%</span>
        </div>

        <ul class="playlist" id="playlistDisplay"></ul>
    </div>

    <div class="text-box">
오늘
누군가 나를향해 활짝
웃어주면 그날 하루가
즐겁습니다

나도 누군가을 향해
환한 미소지으면 나도
행복하고 그 사람도
행복하지않을까요^^

환한 미소지으며
건강들 잘 살피시면서
좋은하루 보내세요.
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const source = document.getElementById('audioSource');
    const titleDisplay = document.getElementById('current-title');
    const playlistDisplay = document.getElementById('playlistDisplay');
    const volSlider = document.getElementById('volumeSlider');
    const volValueText = document.getElementById('volumeValue');

    const songs = [
        "YouAreCryingToo.mp3", 
        "Memory Remains.mp3", 
        "spring.mp3", 
        "그대는어디에.mp3"
    ];
    let currentIdx = 0;

    function renderPlaylist() {
        playlistDisplay.innerHTML = "";
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            if (index === currentIdx) li.className = "active";
            li.innerHTML = song.replace('.mp3', '');
            li.onclick = () => playSong(index);
            playlistDisplay.appendChild(li);
        });
    }

    function playSong(index) {
        currentIdx = index;
        source.src = encodeURIComponent(songs[currentIdx]);
        titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
        audio.load();
        audio.play();
        renderPlaylist();
    }

    volSlider.oninput = (e) => {
        audio.volume = e.target.value;
        volValueText.innerText = Math.round(e.target.value * 100) + "%";
    };

    audio.volume = 0.1;
    renderPlaylist();
    playSong(0);
</script>

</body>
</html>
