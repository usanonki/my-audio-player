<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Premium Audio Player - usanonki</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('Test.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            align-items: center; 
            overflow: hidden;
        }

      .layout-wrapper {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;   /* к°ҖлЎң мӨ‘м•ҷ */
    align-items: center;       /* м„ёлЎң мӨ‘м•ҷ */
    box-sizing: border-box;
    padding: 0;                /* кё°мЎҙ 55% м ңкұ° */
}

        .player-container { 
            width: 350px;
            padding: 50px 25px;
            border-radius: 25px;
            font-family: 'Malgun Gothic', sans-serif;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: linear-gradient(rgba(245, 245, 220, 0.2), rgba(245, 245, 220, 0.2)), url('Happy.jpg');
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(0px); 
            position: relative;
        }

        #current-title { 
            display: block; 
            font-size: 1.1em; 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #3e2723; 
            text-align: center; 
            height: 1.2em; 
            overflow: hidden; 
        }

        /* мҳӨл””мҳӨ л°” лҶ’мқҙ/нҒ¬кё° мӨ„мқҙкё° */
        audio {
            width: 100%;
            height: 25px;          /* кё°ліё лҶ’мқҙ мӨ„мқҙкё° */
            opacity: 0.85;
            margin-bottom: 10px;
            transform: scale(0.9); /* м „мІҙ м»ЁнҠёлЎӨ нҒ¬кё° м¶•мҶҢ */
            transform-origin: center;
        }

        /* н”Ңл Ҳмқҙм–ҙ лӮҙл¶Җ ліјлҘЁ мЎ°м Ҳл°” л°•мҠӨ */
        .inner-volume-box {
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        /* ліјлҘЁ мҠ¬лқјмқҙлҚ” мһҗмІҙ лҶ’мқҙ/л‘җк»ҳ мӨ„мқҙкё° */
        #volumeSlider {
            flex: 1;
            margin: 0 10px;
            cursor: pointer;

            -webkit-appearance: none;
            appearance: none;
            height: 3px;                 /* мҠ¬лқјмқҙлҚ” л°” л‘җк»ҳ */
            background: #ccc;
            border-radius: 5px;
        }

        /* WebKit кі„м—ҙ(нҒ¬лЎ¬, мӮ¬нҢҢлҰ¬ л“ұ)м—җм„ң мҠ¬лқјмқҙлҚ” мҶҗмһЎмқҙ */
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: #ff4757;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Firefoxмҡ© мҶҗмһЎмқҙ */
        #volumeSlider::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #ff4757;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Firefoxмҡ© нҠёлһҷ */
        #volumeSlider::-moz-range-track {
            height: 4px;
            background: #ccc;
            border-radius: 5px;
        }

        .vol-label { 
            font-weight: bold; 
            color: #3e2723; 
            font-size: 0.8em; 
        }

        .playlist { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
            max-height: 250px; 
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 15px;
        }

        .playlist li { 
            padding: 12px 15px; 
            cursor: pointer; 
            color: #4a342e; 
            font-weight: 500; 
            font-size: 0.9em;
            display: flex; 
            align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .playlist li:hover { 
            background: rgba(255, 255, 255, 0.4); 
        }

        .playlist li.active { 
            background: #ff4757; 
            color: white; 
            border-radius: 10px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="player-container">
            <small style="color: #6d4c41; display:block; text-align:center; margin-bottom:5px; font-weight: bold;">Music Library</small>
            <span id="current-title">л…ёлһҳлҘј мһ¬мғқн•ҳм„ёмҡ”</span>
            
            <!-- мҳӨл””мҳӨ л°” -->
            <audio id="myAudio" controls>
                <source id="audioSource" src="" type="audio/mpeg">
            </audio>

            <!-- ліјлҘЁ мЎ°м Ҳл°” -->
            <div class="inner-volume-box">
                <span class="vol-label">Vol</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.1">
                <span id="volumeValue" class="vol-label">10%</span>
            </div>

            <!-- кіЎ лҰ¬мҠӨнҠё -->
            <ul class="playlist" id="playlistDisplay"></ul>
        </div>
    </div>

<script>
    const audio = document.getElementById('myAudio');
    const source = document.getElementById('audioSource');
    const titleDisplay = document.getElementById('current-title');
    const playlistDisplay = document.getElementById('playlistDisplay');
    const volSlider = document.getElementById('volumeSlider');
    const volValueText = document.getElementById('volumeValue');

    const songs = [
        "YouAreCryingToo.mp3", 
        "Memory Remains.mp3", 
        "spring.mp3", 
        "к·ёлҢҖлҠ”м–ҙл””м—җ.mp3"
    ];
    let currentIdx = 0;

    function renderPlaylist() {
        playlistDisplay.innerHTML = "";
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            const isActive = (index === currentIdx);
            const iconColor = isActive ? "white" : "#ff4757";
            
            li.innerHTML = `<span style="color: ${iconColor}; margin-right: 12px;">в–¶</span> ${song.replace('.mp3', '')}`;
            if (isActive) li.className = "active";
            li.onclick = () => playSong(index);
            playlistDisplay.appendChild(li);
        });
    }

    function playSong(index) {
        currentIdx = index;
        source.src = encodeURIComponent(songs[currentIdx]);
        titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
        audio.load();
        audio.play().catch(e => console.log("мһ¬мғқмқ„ мң„н•ҙ нҒҙлҰӯмқҙ н•„мҡ”н•©лӢҲлӢӨ."));
        renderPlaylist();
    }

    // ліјлҘЁ мЎ°м Ҳ кё°лҠҘ
    volSlider.oninput = (e) => {
        const val = e.target.value;
        audio.volume = val;
        volValueText.innerText = Math.round(val * 100) + "%";
    };

    // мҙҲкё° м„Өм •
    audio.volume = 0.1;
    renderPlaylist();

    currentIdx = 0;
    source.src = encodeURIComponent(songs[currentIdx]);
    titleDisplay.innerText = songs[currentIdx].replace('.mp3', '');
    audio.load(); 

    audio.onended = () => {
        let nextIdx = (currentIdx + 1) % songs.length;
        playSong(nextIdx);
    };
</script>

</body>
</html>
