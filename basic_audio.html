<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>경칩 인사말 갤러리</title>

    <!-- 구글 폰트 감자꽃 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 800px;
        height: 500px;
        overflow: hidden;
      }

      /* 사진 페이드 효과 */
      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 3s ease-in-out;
        border-radius: 20px;
      }
      .slide.active {
        opacity: 1;
      }

      /* 비누방울 GIF 오버레이 */
      .bubble-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        z-index: 12;
        opacity: 0.8;
      }

      /* 자막 */
      .caption-container {
        position: absolute;
        bottom: 45px;
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        z-index: 20;
      }

      .scrolling-text {
        display: inline-block;
        font-family: 'Gamja Flower', cursive;
        font-size: 28px;
        color: #adff2f;
        text-shadow:
          2px 2px 2px #000,
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
        padding-left: 100%;
        animation: marquee 40s linear infinite;
      }

      @keyframes marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      /* 미니 오디오 플레이어 */
      .mini-player {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        padding: 10px 14px;
        border-radius: 12px;
        backdrop-filter: blur(4px);
        z-index: 30;
      }

      .album-art {
        width: 48px;
        height: 48px;
        border-radius: 8px;
        margin-right: 10px;
      }

      .player-info {
        display: flex;
        flex-direction: column;
        width: 180px;
      }

      .title {
        font-size: 16px;
        color: #fff;
        margin-bottom: 4px;
      }

      .controls button {
        background: none;
        border: none;
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        margin-bottom: 4px;
      }

      #seekBar {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 비누방울 GIF 오버레이 -->
      <img src="waterspot.gif" class="bubble-overlay" />

      <!-- 감성 미니 오디오 플레이어 -->
      <div class="mini-player">
        <img src="https://usanonki.github.io/photo/064.gif" class="album-art" />

        <div class="player-info">
          <div class="title">Love Potion No. 9</div>

          <div class="controls">
            <button id="playBtn">▶</button>
          </div>

          <input type="range" id="seekBar" value="0" min="0" max="100" />
        </div>
      </div>

      <!-- 메인 오디오 (하나만 사용) -->
      <audio id="bgm" src="LPN9.mp3" autoplay loop></audio>

      <!-- 자막 -->
      <div class="caption-container">
        <div class="scrolling-text">
          🐸 겨울 잠을 자던 개구리가 깨어 나고 새싹이 돋아나는 경칩입니다. 🌸
          경칩이 지나면 봄은 한걸음 더 가까이 오겠죠? 🌼 기온 차가 있는 환절기에
          건강 조심 하시고 오늘 하루도 행복하게 보내시기 바랍니다. ✨
        </div>
      </div>

      <!-- GitHub 이미지 001~008 -->
      <img src="001.jpg" class="slide active" />
      <img src="002.jpg" class="slide" />
