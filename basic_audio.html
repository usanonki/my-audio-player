<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>경칩 인사말 갤러리</title>

    <!-- 구글 폰트 감자꽃 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        height: 100vh;
        overflow: hidden;
      }

      .container {
        position: relative;
        width: 100%;
        max-width: 800px;
        height: 500px;
        overflow: hidden;
      }

      /* 사진 페이드 효과 */
      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 3s ease-in-out;
        border-radius: 20px;
      }
      .slide.active {
        opacity: 1;
      }

      /* 비누방울 GIF 오버레이 */
      .bubble-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        z-index: 12;
        opacity: 0.8;
      }

      /* 자막 — 상단으로 이동 */
      .caption-container {
        position: absolute;
        top: 20px;
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        z-index: 20;
      }

      .scrolling-text {
        display: inline-block;
        font-family: 'Gamja Flower', cursive;
        font-size: 28px;
        color: #adff2f;
        text-shadow:
          2px 2px 2px #000,
          -1px -1px 0 #000,
          1px -1px 0 #000,
          -1px 1px 0 #000,
          1px 1px 0 #000;
        padding-left: 100%;
        animation: marquee 40s linear infinite;
      }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
      }

      /* 미니 오디오 플레이어 */
      .mini-player {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        background: rgba(0, 0, 0, 0.55);
        padding: 12px 16px;
        border-radius: 14px;
        backdrop-filter: blur(4px);
        z-index: 30;
      }

      .album-art {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        margin-right: 12px;
        animation: rotateAlbum 12s linear infinite;
        animation-play-state: paused;
      }

      @keyframes rotateAlbum {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      .player-info {
        display: flex;
        flex-direction: column;
        width: 200px;
      }

      .title {
        font-size: 16px;
        color: #fff;
        margin-bottom: 4px;
      }

      .controls button {
        background: none;
        border: none;
        color: #fff;
        font-size: 22px;
        cursor: pointer;
        margin-bottom: 4px;
        transition: transform 0.2s ease;
      }

      .controls button:active {
        transform: scale(0.85);
      }

      #seekBar {
        width: 100%;
        margin-top: 4px;
      }

      .time-display {
        font-size: 12px;
        color: #ddd;
        margin-top: 4px;
      }

      /* 🔥 볼륨바를 완전히 외부 오른쪽으로 */
      .volume-outside {
        position: absolute;
        bottom: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(0,0,0,0.55);
        padding: 8px 12px;
        border-radius: 10px;
        backdrop-filter: blur(4px);
        z-index: 40;
      }

      .vol-label {
        font-size: 12px;
        color: #ddd;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- 비누방울 GIF 오버레이 -->
      <img src="waterspot.gif" class="bubble-overlay" />

      <!-- 감성 미니 오디오 플레이어 -->
      <div class="mini-player">
        <img src="https://usanonki.github.io/photo/064.gif" class="album-art" />

        <div class="player-info">
          <div class="title">Love Potion No. 9</div>

          <div class="controls">
            <button id="playBtn">▶</button>
          </div>

          <input type="range" id="seekBar" value="0" min="0" max="100" />

          <div class="time-display">
            <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
          </div>
        </div>
      </div>

      <!-- 🔥 볼륨바를 완전히 외부로 분리 -->
      <div class="volume-outside">
        <span class="vol-label">볼륨</span>
        <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1" />
      </div>

      <!-- 메인 오디오 -->
      <audio id="bgm" src="LPN9.mp3" autoplay loop></audio>

      <!-- 자막 (상단) -->
      <div class="caption-container">
        <div class="scrolling-text">
          🐸 겨울 잠을 자던 개구리가 깨어 나고 새싹이 돋아나는 경칩입니다. 🌸
          경칩이 지나면 봄은 한걸음 더 가까이 오겠죠? 🌼 환절기 건강 조심하시고
          오늘 하루도 행복하게 보내세요. ✨
        </div>
      </div>

      <!-- GitHub 이미지 001~008 -->
      <img src="001.jpg" class="slide active" />
      <img src="002.jpg" class="slide" />
      <img src="003.jpg" class="slide" />
      <img src="004.jpg" class="slide" />
      <img src="005.jpg" class="slide" />
      <img src="006.jpg" class="slide" />
      <img src="007.jpg" class="slide" />
      <img src="008.jpg" class="slide" />
    </div>

    <script>
      /* 사진 슬라이드 */
      let currentIndex = 0;
      const slides = document.querySelectorAll('.slide');

      function nextSlide() {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
      }

      setInterval(nextSlide, 20000);

      /* 미니 플레이어 기능 */
      const audio = document.getElementById('bgm');
      const playBtn = document.getElementById('playBtn');
      const seekBar = document.getElementById('seekBar');
      const volumeBar = document.getElementById('volumeBar');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl = document.getElementById('duration');
      const albumArt = document.querySelector('.album-art');

      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
      }

      audio.addEventListener('loadedmetadata', () => {
        durationEl.textContent = formatTime(audio.duration);
      });

      audio.addEventListener('timeupdate', () => {
        seekBar.value = (audio.currentTime / audio.duration) * 100;
        currentTimeEl.textContent = formatTime(audio.currentTime);
      });

      playBtn.addEventListener('click', () => {
        audio.paused ? audio.play() : audio.pause();
      });

      audio.addEventListener('play', () => {
        playBtn.textContent = '❚❚';
        albumArt.style.animationPlayState = 'running';
      });

      audio.addEventListener('pause', () => {
        playBtn.textContent = '▶';
        albumArt.style.animationPlayState = 'paused';
      });

      seekBar.addEventListener('input', () => {
        audio.currentTime = (seekBar.value / 100) * audio.duration;
      });

      volumeBar.addEventListener('input', () => {
        audio.volume = volumeBar.value;
      });

      /* 클릭 시 자동재생 보장 */
      window.addEventListener(
        'click',
        () => {
          if (audio.paused) audio.play();
        },
        { once: true },
      );
    </script>
  </body>
</html>
