<!DOCTYPE html>    
<html>
     <lang="ko"> <!-- 여기에 작성합니다 -->
<head>
    <meta charset="UTF-8"> <!-- 한글 깨짐 방지를 위해 이 줄도 꼭 필요합니다 -->
    <title>신촌블루스</title>
<head>
     <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('https://usanonki.github.io/photo/scblues.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            overflow: hidden;
            font-family: 'Gamja Flower', cursive;
        }

        /* 1. 자막 컨테이너 설정 */
          .marquee-container {
              width: 100%;
              overflow: hidden;
              position: absolute;
              top: 50px;
              transition: opacity 1s ease-in-out;
              opacity: 1;
              z-index: 10;
          }

      /* 2. 자막 글자 설정 (중복 제거 및 줄바꿈 방지 추가) */
          .marquee-container h1 {
         display: inline-block;
         /* 중요: 글자가 아래로 떨어지지 않게 한 줄로 고정 */
          white-space: nowrap; 
          padding-left: 100%;
         animation: marquee 15s linear infinite;
         color: white;
         text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
         font-size: 4rem; 
         font-family: 'Gamja Flower', cursive;
          }


        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        /* 2. 유튜브 영상 설정 */
        #video-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 135px;
            z-index: 9999; /* 자막보다 위에 위치 */
            transition: all 1s ease-in-out;
        }

        #video-container.full-size {
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="marquee-container" id="marquee-text">
        <h1>오늘은 신촌블루스-비의 블루스 입니다. - 세월이 참 빨라요.^^ - Happy Day! </h1>
    </div>

    <div id="video-container">
        <!-- 유튜브 ID를 실제 ID로 교체하세요 -->
        <iframe src="https://www.youtube.com/embed/pmO9KUfnzVE?enablejsapi=1&autoplay=1&controls=1&loop=1&playlist=pmO9KUfnzVE" 
                allow="autoplay; fullscreen"></iframe>
    </div>

    <script>
        setTimeout(function() {
            const video = document.getElementById('video-container');
            const marquee = document.getElementById('marquee-text');

            // 영상은 풀 사이즈로 키우고
            video.classList.add('full-size');

            // 자막은 투명도를 0으로 만들어 Fade-out 시킴
            marquee.style.opacity = '0';
        }, 45000); // 45초 후 실행
    </script>

</body>
</html>
