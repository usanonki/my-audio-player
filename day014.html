<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재생중: YouTube 영상</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: white;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('004.gif') no-repeat center center;
            background-size: center;
            animation: zoomEffect 20s infinite alternate;
            z-index: 0;
        }

        @keyframes zoomEffect {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
        }

        .marquee-container {
            width: 100%;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 22px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            animation: scrollText 25s linear infinite;
        }

        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>

<body>
    <div class="bg-container"></div>

    <div class="content">
        <div class="marquee-container">
            <div class="marquee-text">♬ 당신도 울고 있네요 --- 요즘 조금 한가해서 여러가지 테스트 하는 재미가 쏠쏠합니다.^^ 행복한 하루 되세요! ♬</div>
        </div>

        <iframe align="center" width="750" height="465"
            src="https://www.youtube.com/embed/0vsCi7oU5OQ?autoplay=1&loop=1&playlist=0vsCi7oU5OQ,Eall8Qgzekk,cl1SkDuoo2c"
            frameborder="0"
            allow="autoplay"
            allowfullscreen
            style="border-radius:13px">
        </iframe>
    </div>
</body>
</html>
