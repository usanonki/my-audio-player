<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재생중: YouTube 영상</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: white;
            overflow: hidden; /* 스크롤 방지 */
        }

        /* GIF 배경 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('107.png') no-repeat center center;
            background-size: cover;
            animation: zoomEffect 20s infinite alternate;
            z-index: 0;
        }

        @keyframes zoomEffect {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* 자막 레이어 */
        .marquee-fixed {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            overflow: hidden;
            z-index: 1; /* 영상보다 아래로 배치하여 버튼 조작 방해 금지 */
            pointer-events: none; /* 자막이 클릭을 방해하지 않도록 설정 */
        }

        .marquee-text {
            white-space: nowrap;
            font-size: 32px;
            color: #00e5ff;
            font-weight: normal;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            animation: scrollText 25s linear infinite;
            font-family: 'Gamja Flower', cursive;
        }

        @keyframes scrollText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 유튜브 박스 기본 설정 */
        .youtube-box {
            position: fixed;
            left: 10px;
            bottom: 10px;
            width: 420px;
            height: 240px;
            border-radius: 10px;
            overflow: hidden;
            z-index: 5; /* 조작을 위해 가장 위로 */
            transition: all 0.4s ease-in-out;
            transform-origin: left bottom;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: pointer; /* 클릭 가능하다는 표시 */
        }

        /* [핵심] 클릭 시 추가될 클래스 */
        .youtube-box.expanded {
            transform: scale(1.5); /* 1.5배 확대 (조절 가능) */
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        .youtube-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .content {
            position: relative;
            z-index: 1;
            padding-top: 50px;
        }
    </style>
</head>

<body>

    <div class="bg-container"></div>

    <!-- 흐르는 자막 -->
    <div class="marquee-fixed">
        <div class="marquee-text">♬ 당신도 울고 있네요-Cover --- 여러가지 테스트 하는 중입니다.^^ 행복한 하루 되세요! ♬</div>
    </div>

    <!-- 왼쪽 아래 고정된 유튜브 영상 -->
    <div id="videoPlayer" class="youtube-box">
        <iframe 
            src="https://www.youtube.com"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    </div>

    <div class="content"></div>

    <!-- 자바스크립트 추가 -->
    <script>
        const player = document.getElementById('videoPlayer');

        // 박스를 클릭하면 expanded 클래스를 넣었다 뺐다(toggle) 합니다.
        player.addEventListener('click', function() {
            this.classList.toggle('expanded');
        });

        // 팁: iframe 내부 클릭 시 이벤트 전파가 안 될 수 있으므로 
        // 테두리나 박스 근처를 클릭하면 크기가 바뀝니다.
    </script>

</body>
</html>
